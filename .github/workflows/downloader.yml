name: Download Files from List
permissions:
contents: write
‚Äå
on:
push:
branches:
- develop
‚Äå
jobs:
download-files:
runs-on: ubuntu-latest
‚Äå
env:
GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
‚Äå
steps:
- name: Checkout code
uses: actions/checkout@v6
‚Äå
- name: Download file(s)
run: |
LIST="urls.txt"
‚Äå
if [ -f "$LIST" ]; then
while IFS= read -r url || [ -n "$url" ]; do
url=$(echo "$url" | xargs)
if [ -n "$url" ]; then
wget -q "$url"
fi
done < "$LIST"
echo -n "" > "$LIST"
else
echo "Error: $LIST not found!"
exit 1
fi
‚Äå
- name: Push downloaded file(s)
uses: EndBug/add-and-commit@v10
with:
add: "."
message: "Downloaded"
